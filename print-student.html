<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>พิมพ์รายชื่อนักเรียน — โรงเรียน</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#1a73c0;
    --bg:#f3f6fa;
    --card:#ffffff;
    --border:#dfe6ee;
    --text:#1f2a37;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Sarabun',sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:24px;
  }
  .wrap{max-width:860px;margin:0 auto;}
  .back{display:inline-block;margin-bottom:14px;color:var(--accent);text-decoration:none;font-size:0.9rem;}
  .back:hover{text-decoration:underline;}
  h1{font-size:1.4rem;margin:0 0 4px;}
  .sub{color:#667; margin:0 0 20px; font-size:0.88rem;}
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:22px 24px;
    box-shadow:0 2px 10px rgba(20,40,80,0.05);
    margin-bottom:18px;
  }
  label{display:block; font-size:0.86rem; font-weight:500; margin:0 0 6px; color:#445;}
  .field{margin-bottom:0;}
  .row3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:18px;}
  select{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:8px;
    font-family:'Sarabun',sans-serif;
    font-size:0.92rem;
    background:#fbfcfe;
  }
  select:focus{outline:none; border-color:var(--accent); background:#fff;}
  .actions{display:flex; gap:12px; flex-wrap:wrap;}
  button{
    font-family:'Sarabun',sans-serif;
    font-size:0.95rem;
    font-weight:600;
    padding:12px 22px;
    border-radius:10px;
    border:none;
    cursor:pointer;
  }
  .btn-primary{background:var(--accent); color:#fff;}
  .btn-primary:hover{background:#155a96;}
  .btn-primary:disabled{background:#aebed0; cursor:not-allowed;}
  .btn-secondary{background:#eef2f7; color:#33414f;}
  .btn-secondary:hover{background:#e1e8f0;}
  #status{margin-top:12px; font-size:0.86rem; min-height:1.2em;}
  #status.err{color:#c0392b;}
  #status.ok{color:#1e7d3c;}

  table{width:100%; border-collapse:collapse; margin-top:4px;}
  th, td{border:1px solid var(--border); padding:8px 10px; text-align:left; font-size:0.88rem;}
  th{background:#eef4fb; font-weight:600;}
  tr:nth-child(even) td{background:#fafcfe;}
  .roster-title{text-align:center; margin:0 0 14px;}
  .roster-title h2{margin:0; font-size:1.15rem;}
  .roster-title p{margin:4px 0 0; font-size:0.85rem; color:#667;}
  .empty-note{color:#9aa6b5; font-size:0.86rem; text-align:center; padding:30px 0;}

  @media print {
    body{ background:#fff; padding:0; }
    .back, .card.controls, .actions, #status{ display:none !important; }
    .wrap{ max-width:100%; }
    .card.roster{ box-shadow:none; border:none; padding:0; }
  }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="auth-guard.js"></script>
</head>
<body>
<div class="wrap">
  <a class="back" href="./index.html">← กลับหน้าหลัก</a>
  <h1>🖨️ พิมพ์รายชื่อนักเรียน</h1>
  <p class="sub">เลือกระดับและห้อง แล้วกดค้นหารายชื่อ จากนั้นกดพิมพ์ — ข้อมูลดึงจากทำเนียบนักเรียน (เฉพาะ เลขที่ / ชื่อ-สกุล / ห้อง เท่านั้น ไม่รวมข้อมูลส่วนตัวอื่น ๆ)</p>

  <div class="card controls">
    <div class="row3">
      <div class="field">
        <label>ระดับ</label>
        <select id="levelSelect"><option value="">— ทุกระดับ —</option></select>
      </div>
      <div class="field">
        <label>ห้อง</label>
        <select id="roomSelect"><option value="">— ทุกห้อง —</option></select>
      </div>
      <div class="field" style="display:flex; align-items:flex-end;">
        <button type="button" class="btn-primary" id="searchBtn" style="width:100%;">🔍 ค้นหารายชื่อ</button>
      </div>
    </div>
    <div class="actions">
      <button type="button" class="btn-secondary" id="printBtn" disabled>🖨️ พิมพ์รายชื่อ</button>
    </div>
    <div id="status"></div>
  </div>

  <div class="card roster" id="rosterCard" style="display:none;">
    <div class="roster-title">
      <h2 id="rosterHeading">รายชื่อนักเรียน</h2>
      <p id="rosterSub"></p>
    </div>
    <table>
      <thead>
        <tr><th style="width:70px;">เลขที่</th><th>ชื่อ-สกุล</th><th style="width:110px;">ห้อง</th></tr>
      </thead>
      <tbody id="rosterBody"></tbody>
    </table>
  </div>
</div>

<script>
// วาง URL ของ Apps Script Web App (ลงท้ายด้วย /exec) ที่ deploy จาก apps-script/print-students.gs
const PRINT_STUDENTS_API_URL = 'https://script.google.com/macros/s/AKfycbzeKfvCFZ3eN3jNoZYlwlekonsV09KGnkf6CguGWY2TQw6Z0RtvTY8AKbe4_Rn7dpxdmg/exec';

let ALL_STUDENTS = [];

function naturalCompare(a, b){
  return String(a).localeCompare(String(b), 'th', { numeric: true });
}

let jsonpSeq = 0;

// fetch() across origins breaks here because the domain-restricted Apps
// Script Web App responds with a redirect to a Google login page when the
// session isn't recognized in a CORS request. Loading via a <script> tag
// (JSONP) sidesteps CORS entirely and carries the browser's existing Google
// login session, so the school-domain restriction still works.
function fetchStudentsJSONP(){
  return new Promise((resolve, reject) => {
    const cbName = '__print_students_cb_' + (jsonpSeq++);
    const script = document.createElement('script');
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('หมดเวลาเชื่อมต่อ (timeout) — ตรวจสอบว่า login บัญชี Google ของโรงเรียนอยู่หรือไม่'));
    }, 15000);

    function cleanup(){
      clearTimeout(timeout);
      delete window[cbName];
      script.remove();
    }

    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('โหลดสคริปต์ไม่สำเร็จ')); };

    const sep = PRINT_STUDENTS_API_URL.indexOf('?') === -1 ? '?' : '&';
    script.src = `${PRINT_STUDENTS_API_URL}${sep}callback=${cbName}`;
    document.body.appendChild(script);
  });
}

async function loadStudents(){
  const statusEl = document.getElementById('status');
  if(!PRINT_STUDENTS_API_URL || PRINT_STUDENTS_API_URL.indexOf('PASTE_YOUR') === 0){
    statusEl.className = 'err';
    statusEl.textContent = '⚠️ ยังไม่ได้ตั้งค่า URL ของ Apps Script — ดูวิธีตั้งค่าใน apps-script/print-students.gs';
    return;
  }
  try{
    const data = await fetchStudentsJSONP();
    if(data.error) throw new Error(data.error);
    ALL_STUDENTS = data.students || [];
    populateFilters();
  }catch(err){
    console.error(err);
    statusEl.className = 'err';
    statusEl.textContent = '❌ โหลดข้อมูลไม่สำเร็จ: ' + (err.message || err);
  }
}

function populateFilters(){
  const levels = [...new Set(ALL_STUDENTS.map(s => s.level).filter(Boolean))].sort(naturalCompare);
  const levelSelect = document.getElementById('levelSelect');
  levels.forEach(l => {
    const o = document.createElement('option');
    o.value = l; o.textContent = l;
    levelSelect.appendChild(o);
  });
  updateRoomOptions();
}

function updateRoomOptions(){
  const level = document.getElementById('levelSelect').value;
  const roomSelect = document.getElementById('roomSelect');
  roomSelect.innerHTML = '<option value="">— ทุกห้อง —</option>';
  const rooms = [...new Set(
    ALL_STUDENTS.filter(s => !level || s.level === level).map(s => s.room).filter(Boolean)
  )].sort(naturalCompare);
  rooms.forEach(r => {
    const o = document.createElement('option');
    o.value = r; o.textContent = r;
    roomSelect.appendChild(o);
  });
}

document.getElementById('levelSelect').addEventListener('change', updateRoomOptions);

document.getElementById('searchBtn').addEventListener('click', () => {
  const level = document.getElementById('levelSelect').value;
  const room = document.getElementById('roomSelect').value;
  const statusEl = document.getElementById('status');
  statusEl.className = ''; statusEl.textContent = '';

  const filtered = ALL_STUDENTS
    .filter(s => (!level || s.level === level) && (!room || s.room === room))
    .sort((a, b) => naturalCompare(a.no, b.no));

  const rosterCard = document.getElementById('rosterCard');
  const tbody = document.getElementById('rosterBody');
  const printBtn = document.getElementById('printBtn');

  if(filtered.length === 0){
    rosterCard.style.display = 'block';
    tbody.innerHTML = '';
    document.getElementById('rosterHeading').textContent = 'ไม่พบรายชื่อนักเรียน';
    document.getElementById('rosterSub').textContent = '';
    printBtn.disabled = true;
    return;
  }

  tbody.innerHTML = filtered.map(s =>
    `<tr><td>${s.no}</td><td>${s.name}</td><td>${s.room}</td></tr>`
  ).join('');

  const heading = level || room
    ? `รายชื่อนักเรียน ${level ? 'ระดับ ' + level : ''} ${room ? 'ห้อง ' + room : ''}`.trim()
    : 'รายชื่อนักเรียนทั้งหมด';
  document.getElementById('rosterHeading').textContent = heading;
  document.getElementById('rosterSub').textContent = `จำนวน ${filtered.length} คน`;
  rosterCard.style.display = 'block';
  printBtn.disabled = false;
});

document.getElementById('printBtn').addEventListener('click', () => window.print());

loadStudents();
</script>
</body>
</html>
