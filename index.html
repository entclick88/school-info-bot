<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบข้อมูลพื้นฐาน มอ.วิทยานุสรณ์</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1a3a6e;
      --accent: #2563eb;
      --bg: #f1f5f9;
      --white: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--bg);
    }

    /* ── 2-column layout: ซ้าย = ผู้ช่วยแชท, ขวา = ลิงก์ลัดระบบย่อย ── */
    .layout {
      display: flex;
      height: 100dvh;
      overflow: hidden;
    }
    .left-panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }
    .right-panel {
      width: 260px;
      flex-shrink: 0;
      background: var(--white);
      border-left: 1px solid var(--border);
      padding: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .right-panel-top {
      flex: 1;
      padding: 14px 12px 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }
    .right-panel-tools {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      padding: 12px 12px 14px;
      background: var(--bg);
    }
    .tools-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .tools-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .tool-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 600;
      transition: background .15s, border-color .15s;
    }
    .tool-link:hover {
      background: #eff6ff;
      border-color: var(--accent);
    }
    .tool-link .tl-icon { font-size: 1.1rem; flex-shrink: 0; }
    .right-panel-title {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 2px;
    }
    .right-panel-sub {
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .quick-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 12px 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      text-align: center;
      transition: background .15s, border-color .15s, transform .15s;
      min-height: 78px;
    }
    .quick-link:hover {
      background: #eff6ff;
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .quick-link .qi-icon { font-size: 1.5rem; line-height: 1; }
    .quick-link .qi-label { font-size: 0.68rem; font-weight: 600; line-height: 1.25; }

    @media (max-width: 800px) {
      .layout { flex-direction: column; }
      .right-panel {
        width: 100%;
        max-height: 40vh;
        border-left: none;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }
      .right-panel-tools { display: none; }
      .quick-grid { grid-template-columns: repeat(4, 1fr); }
      .left-panel { flex: 1 1 auto; min-height: 0; }
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1a3a6e 0%, #2563eb 100%);
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .header-icon { font-size: 2rem; line-height: 1; }
    .header-text { flex: 1; }
    .header-text h1 { font-size: 1rem; font-weight: 700; line-height: 1.3; }
    .header-text p  { font-size: 0.78rem; opacity: 0.85; }
    .settings-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .15s;
    }
    .settings-btn:hover { background: rgba(255,255,255,0.3); }
    .header-actions { position: relative; display: flex; gap: 8px; flex-shrink: 0; }

    /* ── Department tabs ── */
    .dept-strip {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      overflow-x: auto;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      scrollbar-width: none;
    }
    .dept-strip::-webkit-scrollbar { display: none; }
    .dept-btn {
      flex: 0 0 auto;
      padding: 5px 12px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Sarabun', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      color: white;
      white-space: nowrap;
      transition: opacity .15s, transform .15s;
    }
    .dept-btn:hover { opacity: .85; transform: scale(1.03); }
    .dept-btn:active { transform: scale(.97); }

    /* ── Chat area ── */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    /* bubbles */
    .msg {
      max-width: 88%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.55;
      word-break: break-word;
    }
    .msg.bot {
      background: var(--white);
      border: 1px solid var(--border);
      align-self: flex-start;
      border-radius: 4px 16px 16px 16px;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
    }
    .msg.user {
      background: var(--accent);
      color: white;
      align-self: flex-end;
      border-radius: 16px 4px 16px 16px;
    }

    /* result cards */
    .result-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
    .card {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 12px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      transition: background .15s, border-color .15s, box-shadow .15s;
      cursor: pointer;
    }
    .card:hover {
      background: #eff6ff;
      border-color: var(--accent);
      box-shadow: 0 3px 8px rgba(37,99,235,.12);
    }
    .card-badge {
      flex-shrink: 0;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .card-name { flex: 1; font-size: 0.86rem; }
    .card-arrow { color: var(--accent); font-size: 1rem; flex-shrink: 0; }
    .no-result { color: var(--muted); font-style: italic; font-size: 0.88rem; }
    .result-count { font-size: 0.82rem; color: var(--muted); margin-bottom: 4px; }
    .thinking { color: var(--muted); }
    .thinking::after {
      content: '';
      display: inline-block;
      width: 1em;
      animation: dots 1.2s steps(4) infinite;
      overflow: hidden;
      vertical-align: bottom;
    }
    @keyframes dots { to { width: 0; } }
    .ai-tag { display: inline-block; font-size: 0.66rem; font-weight: 700; color: var(--accent); background: #eff6ff; border-radius: 8px; padding: 1px 7px; margin-bottom: 5px; }

    /* ── Input area ── */
    .input-row {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      background: var(--white);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-row input {
      flex: 1;
      padding: 9px 15px;
      border: 2px solid var(--border);
      border-radius: 24px;
      font-family: 'Sarabun', sans-serif;
      font-size: 0.92rem;
      outline: none;
      transition: border-color .2s;
      background: var(--bg);
    }
    .input-row input:focus { border-color: var(--accent); background: white; }
    .input-row button {
      padding: 9px 18px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      font-family: 'Sarabun', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background .2s;
    }
    .input-row button:hover { background: var(--primary); }

    @media (max-width: 480px) {
      .header-text h1 { font-size: 0.88rem; }
      .msg { max-width: 94%; }
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="auth-guard.js"></script>
</head>
<body>

<div class="layout">
  <div class="left-panel">
    <!-- Header -->
    <div class="header">
      <div class="header-icon">🏫</div>
      <div class="header-text">
        <h1>ระบบข้อมูลพื้นฐาน</h1>
        <p>โรงเรียน มอ.วิทยานุสรณ์ สุราษฎร์ธานี</p>
      </div>
      <div class="header-actions">
        <button class="settings-btn" id="settingsBtn" title="ตั้งค่าผู้ช่วย AI">⚙️</button>
      </div>
    </div>

    <!-- Department tabs -->
    <div class="dept-strip" id="deptStrip"></div>

    <!-- Chat -->
    <div class="chat" id="chat"></div>

    <!-- Input -->
    <div class="input-row">
      <input id="inp" type="text" placeholder="พิมพ์คำค้นหา เช่น วิชาการ, ประชุม, นักเรียน, STEM…" autocomplete="off">
      <button id="sendBtn">ค้นหา</button>
    </div>
  </div>

  <!-- Right panel: ลิงก์ลัดระบบย่อย + เครื่องมือ -->
  <div class="right-panel">
    <div class="right-panel-top">
      <div class="right-panel-title">🔗 ระบบย่อยที่ใช้บ่อย</div>
      <div class="right-panel-sub">ระบบอื่น ๆ ค้นหาได้จากแชทด้านซ้าย</div>
      <div class="quick-grid" id="quickGrid"></div>
    </div>
    <div class="right-panel-tools">
      <div class="tools-title">🛠️ เครื่องมือ</div>
      <div class="tools-list">
        <a class="tool-link" href="./qrcode.html" target="_blank" rel="noopener noreferrer">

        <a class="tool-link" href="https://entclick88.github.io/school-memo/" target="_blank" rel="noopener noreferrer"><span class="tl-icon">📄</span>ระบบเอกสาร
        </a>

          <span class="tl-icon">🖨️</span>พิมพ์รายชื่อนักเรียน
        </a>
      </div>
    </div>
  </div>
</div>

const SHEET_ID = '15jTvPkpiCYkhrwITbnWHbTgZHsFOPkwgchUA0IM5pAg';
const csvCache = {};
let jsonpSeq = 0;

// Google's gviz tq endpoint does not send CORS headers for plain fetch(),
// so it must be loaded via a <script> tag using its JSONP-style callback
// (tqx=responseHandler:<name>) instead of fetch().
function fetchSheetJSONP(sheetName) {
  return new Promise((resolve, reject) => {
    const cbName = '__gviz_cb_' + (jsonpSeq++);
    const script = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); reject(new Error('โหลดชีท "' + sheetName + '" หมดเวลา')); }, 15000);
    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    window[cbName] = (resp) => {
      cleanup();
      if (resp.status === 'error') {
        reject(new Error('โหลดชีท "' + sheetName + '" ไม่สำเร็จ: ' + (resp.errors && resp.errors[0] && resp.errors[0].detailed_message || 'unknown error')));
        return;
      }
      resolve(resp.table);
    };
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:${cbName}&sheet=${encodeURIComponent(sheetName)}`;
    script.src = url;
    script.onerror = () => { cleanup(); reject(new Error('โหลดชีท "' + sheetName + '" ไม่สำเร็จ (network)')); };
    document.head.appendChild(script);
  });
}

function gvizCellText(cell) {
  if (!cell) return '';
  const val = (cell.f !== undefined && cell.f !== null) ? cell.f : cell.v;
  if (val === undefined || val === null) return '';
  return String(val);
}

function csvEscapeField(s) {
  if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

// Reconstruct an out:csv-equivalent text blob from the gviz JSON table,
// so all downstream regex/parseCSV logic stays unchanged.
function gvizTableToCsv(table) {
  const numCols = table.cols.length;
  const lines = [table.cols.map(c => csvEscapeField(c.label || '')).join(',')];
  table.rows.forEach(row => {
    const cells = [];
    for (let i = 0; i < numCols; i++) cells.push(csvEscapeField(gvizCellText(row.c && row.c[i])));
    lines.push(cells.join(','));
  });
  return lines.join('\n');
}

async function fetchSheetCSV(sheetName) {
  if (csvCache[sheetName]) return csvCache[sheetName];
  const table = await fetchSheetJSONP(sheetName);
  const csv = gvizTableToCsv(table);
  csvCache[sheetName] = csv;
  return csv;
}

// Minimal RFC4180-ish CSV parser (handles quoted fields, embedded commas/newlines)
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\r') { /* skip */ }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else field += c;
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows;
}

// normalize Thai text with duplicated combining-mark typos
// (e.g. "ฝ่่าย" -> "ฝ่าย", "พััฒนา" -> "พัฒนา", "นัักเรียน" -> "นักเรียน")
function normalizeThai(s) {
  return (s || '').replace(/([ัิ-ฺ็-๎])\1+/g, '$1').trim();
}

// หา index ของคอลัมน์จาก header โดยเทียบคำสำคัญ (ไม่ผูกกับลำดับคอลัมน์ตายตัว
// เพื่อให้ทนทานต่อการแก้ไขชีทในอนาคต)
function findCol(headers, keywords) {
  for (let i = 0; i < headers.length; i++) {
    const h = normalizeThai(headers[i] || '').toLowerCase();
    if (keywords.some(k => h.includes(k))) return i;
  }
  return -1;
}

function toNumber(s) {
  const n = parseFloat(String(s || '').replace(/,/g, '').trim());
  return isNaN(n) ? null : n;
}

// ── ตัวสรุปข้อมูลแบบรวม (aggregate-only) จากชีทอื่นๆ ──
// หลักการ: ส่งออกได้เฉพาะ "ตัวเลขสรุป/รายการหมวดหมู่" เท่านั้น
// ห้ามดึงชื่อนักเรียนรายบุคคล เลขบัตรประชาชน ที่อยู่ เบอร์โทร หรือข้อมูลส่วนบุคคลอื่นๆ ออกมา
async function buildClubDigest() {
  try {
    const csv = await fetchSheetCSV('สังกัดชุมนุม');
    const rows = parseCSV(csv);
    const headers = rows[0] || [];
    const clubCol = findCol(headers, ['ชุมนุม']);
    if (clubCol === -1) return null;
    const counts = {};
    rows.slice(1).forEach(r => {
      const c = normalizeThai((r[clubCol] || '').trim());
      if (!c) return;
      counts[c] = (counts[c] || 0) + 1;
    });
    const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    if (!entries.length) return null;
    return `รายชื่อชุมนุมและจำนวนนักเรียนในชุมนุม (รวม ${entries.length} ชุมนุม):\n` +
      entries.map(([k, v]) => `- ${k}: ${v} คน`).join('\n');
  } catch (e) { return null; }
}

async function buildBudgetDigest() {
  try {
    const csv = await fetchSheetCSV('งบประมาณโครงการ');
    const rows = parseCSV(csv);
    const headers = rows[0] || [];
    const nameCol = findCol(headers, ['ชื่อโครงการ', 'โครงการ']);
    const amountCol = findCol(headers, ['งบประมาณ', 'จำนวนเงิน', 'อนุมัติ', 'เบิกจ่าย', 'ใช้จริง']);
    const dataRows = rows.slice(1).filter(r => r.some(c => c && c.trim()));
    if (!dataRows.length) return null;
    let total = 0, counted = 0;
    const projects = new Set();
    dataRows.forEach(r => {
      if (nameCol !== -1 && r[nameCol] && r[nameCol].trim()) projects.add(normalizeThai(r[nameCol].trim()));
      if (amountCol !== -1) {
        const n = toNumber(r[amountCol]);
        if (n !== null) { total += n; counted++; }
      }
    });
    let out = `ข้อมูลงบประมาณโครงการ: มีโครงการทั้งหมด ${projects.size || dataRows.length} โครงการ (จาก ${dataRows.length} รายการในบันทึก)`;
    if (counted) out += `, ยอดรวม${headers[amountCol] ? ' "' + headers[amountCol] + '"' : 'งบประมาณ'} ประมาณ ${total.toLocaleString('th-TH')} บาท`;
    return out;
  } catch (e) { return null; }
}

1. ห้ามสร้างหรือเดาตัวเลข/ข้อมูลที่คุณไม่มีอยู่จริง — ถ้าไม่มีข้อมูลให้บอกตรงๆ ว่าไม่มีข้อมูลนี้ และแนะนำให้ติดต่อฝ่ายที่เกี่ยวข้อง
2. ห้ามให้ข้อมูลส่วนบุคคลของนักเรียน/บุคลากรรายบุคคล (ชื่อ, เลขบัตรประชาชน, ที่อยู่, เบอร์โทร) แม้จะถูกขอ เพราะคุณไม่มีและไม่ควรมีข้อมูลนั้น

async function askClaude(question) {
  const key = getApiKey();
  if (!key) return null;
  const digest = await buildLiveDigest();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 500,
        system: digest,
        messages: [{ role: 'user', content: question }]
      })
    });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`API error ${res.status}: ${errText.slice(0, 200)}`);
    }
    const data = await res.json();
    return data.content?.[0]?.text || null;
  } catch (err) {
    return `⚠️ เรียก AI ไม่สำเร็จ: ${err.message}`;
  }
}

const chat = document.getElementById('chat');

function addUserMsg(text) {
  const el = document.createElement('div');

  chat.scrollTop = chat.scrollHeight;
  return el;
}

function showResults(results, label) {
  const el = document.createElement('div');
  el.className = 'msg bot';

  // filter out placeholder '#' links
  const valid = results.filter(r => r.url && r.url !== '#');
  const total = results.length;
  const shown = valid.length;

  if (total === 0) {
    el.innerHTML = `<span class="no-result">ไม่พบข้อมูลที่ตรงกับ "<strong>${label}</strong>"<br>ลองใช้คำอื่น เช่น วิชาการ, ประชุม, นักเรียน, STEM</span>`;
  } else {
    el.innerHTML = `<div class="result-count">พบ ${shown} รายการ${shown < total ? ` (จาก ${total} ทั้งหมด มีลิงก์)` : ''}:</div>`;
    const list = document.createElement('div');
    list.className = 'result-list';
    valid.forEach(r => {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = r.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.innerHTML = `
        <span class="card-badge" style="background:${r.color}22;color:${r.color}">${r.icon} ${r.dept}</span>
        <span class="card-name">${r.name}</span>
        <span class="card-arrow">↗</span>
      `;
      list.appendChild(a);
    });
    el.appendChild(list);
  }
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

// Search logic
// ════════════════════════════════════════════════
function search(q) {
  q = q.toLowerCase().trim();
  if (!q) return [];
  const hits = [];
  DEPTS.forEach(d => {
    const deptMatch = d.name.toLowerCase().includes(q) || d.id.includes(q);
    d.links.forEach(l => {
      const nameMatch = l.name.toLowerCase().includes(q);
      if (deptMatch || nameMatch) {
        hits.push({ ...l, dept: d.name, color: d.color, icon: d.icon });
      }
    });
  });
  // deduplicate
  return [...new Map(hits.map(h => [h.name, h])).values()];
}

// Send
// ════════════════════════════════════════════════
async function send() {
  const inp = document.getElementById('inp');
  const q = inp.value.trim();
  if (!q) return;
  addUserMsg(q);
  inp.value = '';

  const qLower = q.toLowerCase();

  // Tier 1: live stat calculators (exact, client-side, no PII ever leaves the browser)
  for (const stat of STATS) {
    if (stat.keywords.some(k => qLower.includes(k.toLowerCase()))) {
      const thinkingEl = addBotMsg('<span class="thinking">กำลังตรวจสอบข้อมูลสด</span>');
      try {
        const html = await stat.handler();
        thinkingEl.remove();
        if (html) { addBotMsg(html); return; }
      } catch (err) {
        thinkingEl.remove();
        addBotMsg(`⚠️ ดึงข้อมูลสถิติไม่สำเร็จ: ${err.message}`);
        return;
      }
      break;
    }
  }

  // Tier 2: link/department search (existing MENU directory)
  const results = search(q);
  if (results.length > 0) {
    showResults(results, q);
    return;
  }

  // Tier 3: Claude API fallback for open-ended questions
  const key = getApiKey();
  if (!key) {
    addBotMsg(`ไม่พบข้อมูลที่ตรงกับ "<strong>${q}</strong>" ในฐานข้อมูลสถิติหรือลิงก์ของโรงเรียน<br><br>💡 ต้องการให้ AI ช่วยตอบคำถามปลายเปิดไหมครับ? กดปุ่ม ⚙️ ที่หัวข้อด้านบนเพื่อตั้งค่า Claude API Key ของคุณเอง`);
    return;
  }
  const thinkingEl = addBotMsg('<span class="thinking">AI กำลังคิด</span>');
  const answer = await askClaude(q);
  thinkingEl.remove();
  if (answer) {
    addBotMsg(`<span class="ai-tag">🤖 AI ตอบ</span><br>${answer.replace(/\n/g, '<br>')}`);
  } else {
    addBotMsg(`ไม่พบข้อมูลที่ตรงกับ "<strong>${q}</strong>"`);
  }
}
